<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUMORA Dimsum Flora</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🌸 SUMORA DIMSUM FLORA 🌸</h1>

<img src="dimsum.jpg" class="produk">

<h2>Rp12.000 / Box</h2>

<p class="tagline">
Sehat • Enak • Mantap!
</p>

<div class="payment-box">

<h3>📱 Pembayaran QRIS</h3>

<img src="qris.jpg" class="qris">

<p>Scan QRIS untuk pembayaran</p>

</div>

<form id="orderForm">

<input
type="text"
id="nama"
placeholder="Nama Pemesan"
required>

<input
type="number"
id="jumlah"
placeholder="Jumlah Box"
required>

<select id="pembayaran">
<option>QRIS</option>
<option>Cash</option>
</select>

<button type="submit">
Pesan Sekarang
</button>

</form>

<div id="status"></div>

<div class="status-box">

<h3>📦 Status Pesanan</h3>

<p id="statusOrder">
Belum ada pesanan
</p>

</div>

<div class="history">

<h3>📋 Riwayat Pesanan</h3>

<ul id="historyList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
